services:
  - type: web
    name: negnews-catching-agent
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 300 --workers 2 --chdir /opt/render/project/src
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
